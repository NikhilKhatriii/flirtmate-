name: flirtmate
description: FlirtMate - Infinite flirt message generator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  share_plus: ^13.2.0
  http: ^1.1.0
  flutter_animate: ^4.3.0
  cupertino_icons: ^1.0.6

  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_analytics: ^12.4.3
  lucide_icons_flutter: ^3.1.14+2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
